# QIBB-backend is a Node API deployed to Azure (main_qipp-api.yml).
# This workflow replaces the default Jekyll Pages build (which fails on node_modules / API creds).

name: Deploy GitHub Pages (static)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Build static site
        run: |
          mkdir -p public
          cat > public/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>QIPP API</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; color: #2e2044; }
              a { color: #9273da; }
            </style>
          </head>
          <body>
            <h1>QIPP Operations API</h1>
            <p>This repository is the Node.js backend. Production runs on Azure App Service, not GitHub Pages.</p>
            <p><a href="https://qipp-api.azurewebsites.net/api">https://qipp-api.azurewebsites.net/api</a></p>
            <p>Application deploy: workflow <code>main_qipp-api.yml</code>.</p>
          </body>
          </html>
          HTML
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
