name: Build and deploy Node.js app to Azure Web App - qipp-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy to qipp-api at a time (409/503/504 if zip deploy overlaps or SCM is busy).
concurrency:
  group: qipp-api-production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies (CI)
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-jwt-secret-at-least-32-chars-long
          COSMOS_URI: mongodb://127.0.0.1:27017/qipp-ci-test

      - name: Install production dependencies only
        run: npm ci --omit=dev

      - name: Create lean deployment package
        run: |
          mkdir -p deploy-package
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='coverage/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='etl/' \
            --exclude='env' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='data/plant-trends-cache.json' \
            --exclude='data/quizzes/' \
            --exclude='uploads/' \
            --exclude='*.log' \
            --exclude='release.zip' \
            --exclude='deploy-package/' \
            . deploy-package/
          cd deploy-package
          zip -rq ../release.zip .
          ls -lh ../release.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_75D8CEE151AC437E8E804F88487421E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CA71DF4C79E042D9A8C61D8F46C5C6F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_32286830F7AA4C78843472706989ECAA }}

      - name: Resolve app resource group
        id: app
        run: |
          RG=$(az webapp list --query "[?name=='qipp-api'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for qipp-api"
            exit 1
          fi
          echo "resource-group=$RG" >> "$GITHUB_OUTPUT"
          echo "Deploying to qipp-api in resource group: $RG"

      - name: Configure deployment app settings
        run: |
          az webapp config appsettings set \
            --name qipp-api \
            --resource-group "${{ steps.app.outputs.resource-group }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

      # Stop the running app so OneDeploy/SCM is not contending with live node process + plant ingest.
      # Plant ingest on boot (index.js) is async after listen(); SCM 503/504 is usually Kudu overload.
      # If deploys still fail during ingest windows, set PLANT_INGEST_ON_STARTUP=0 in App Settings.
      - name: Stop app before deploy
        run: |
          az webapp stop \
            --name qipp-api \
            --resource-group "${{ steps.app.outputs.resource-group }}"
          echo "Waiting 15s for SCM/Kudu to settle..."
          sleep 15

      - name: Deploy to Azure Web App (retry with backoff)
        run: |
          APP_NAME=qipp-api
          RG="${{ steps.app.outputs.resource-group }}"
          MAX_ATTEMPTS=5
          WAIT=30
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Deploy attempt $attempt of $MAX_ATTEMPTS..."
            if az webapp deploy \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --src-path release.zip \
              --type zip \
              --timeout 1800000; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Deploy failed; waiting ${WAIT}s before retry..."
              sleep "$WAIT"
              WAIT=$((WAIT * 2))
            fi
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Start app after deploy
        if: always()
        run: |
          az webapp start \
            --name qipp-api \
            --resource-group "${{ steps.app.outputs.resource-group }}"

      - name: Wait for health endpoint
        run: |
          URL="https://qipp-api.azurewebsites.net/health"
          for i in $(seq 1 36); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "App is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Health check did not return 200 within 6 minutes (deploy may still be warming up)"
          exit 1
